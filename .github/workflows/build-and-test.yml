name: Build & test

on:
  push:
    branches: [master, aarch64]
  pull_request:

env:
  LLVM_VERSION: "21.1.7"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux x86_64
          - os: macos-15
            name: macOS aarch64
          - os: windows-2022
            name: Windows x86_64

    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Restore LLVM cache
        id: cache-llvm
        uses: actions/cache/restore@v4
        with:
          path: |
            build/_deps
            build/.ninja_log
            build/.ninja_deps
          key: ${{ matrix.os }}-llvm-${{ env.LLVM_VERSION }}-v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev xorg-dev libglu1-mesa-dev

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: cmake --build build --target llvm-libs

      - name: Save LLVM cache
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            build/_deps
            build/.ninja_log
            build/.ninja_deps
          key: ${{ matrix.os }}-llvm-${{ env.LLVM_VERSION }}-v6

      - name: Build
        timeout-minutes: 30
        run: cmake --build build --parallel 2

      - name: Test
        timeout-minutes: 15
        run: ctest --test-dir build --build-config Release --label-regex libs-core --output-on-failure
