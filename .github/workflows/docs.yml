name: Deploy docs

on:
  # Auto-deploy disabled until DOCS_DEPLOY_KEY is configured in repo secrets.
  # Re-enable by uncommenting the push trigger below.
  # push:
  #   branches: [master]
  #   paths: ['docs/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
        working-directory: docs
      - run: npm run build
        working-directory: docs
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DOCS_DEPLOY_KEY }}
          external_repository: extemporelang/extemporelang.github.io
          publish_dir: docs/.vitepress/dist
